# Reversa — Configuração do Projeto
# Este arquivo é gerenciado pelo instalador. Para customizações, edite config.user.toml

[project]
name = "secretaria CSM - educação Básica"
version = "1.0.0"

[user]
name = "adelino"
chat_language = "pt-br"
doc_language = "portugues"

[output]
folder = "_reversa_sdd"

[agents]
installed = [
  "reversa",
  "reversa-scout",
  "reversa-archaeologist",
  "reversa-detective",
  "reversa-architect",
  "reversa-writer",
  "reversa-reviewer",
  "reversa-visor",
  "reversa-data-master",
  "reversa-design-system",
  "reversa-agents-help",
  "reversa-reconstructor",
  "reversa-forward",
  "reversa-requirements",
  "reversa-clarify",
  "reversa-plan",
  "reversa-to-do",
  "reversa-audit",
  "reversa-quality",
  "reversa-coding",
  "reversa-principles",
  "reversa-resume",
  "reversa-new",
  "reversa-ideator",
  "reversa-researcher",
  "reversa-drafter",
  "reversa-spec-sdd",
  "reversa-pricing-profile",
  "reversa-pricing-size",
  "reversa-pricing-estimate",
  "reversa-docs",
  "reversa-docs-mapper",
  "reversa-docs-analyst",
  "reversa-docs-storyteller",
  "reversa-docs-publisher",
  "reversa-arquitetura-3d",
  "reversa-selo-generativo",
  "reversa-highcharts-visualizer",
  "reversa-especialista-d3",
  "reversa-image-prompt-json"
]

[engines]
installed = [
  "codex",
  "antigravity",
  "opencode"
]

[analysis]
answer_mode = "file"
doc_level = "completo"

# Organização das specs geradas pelos agentes.
# Esta seção é preenchida pelo Reversa após o Scout sugerir uma estrutura
# e o usuário confirmar a escolha no menu (logo após a pergunta de doc_level).
# Para reapresentar o menu, remova a seção [specs] inteira e rode o Reversa de novo.
[specs]
layout = "feature-folder"
granularity = "feature"
custom_folders = []
scout_suggestion = ""
decided_at = "2026-06-03T20:07:40Z"
